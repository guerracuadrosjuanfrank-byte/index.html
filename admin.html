<!DOCTYPE html>
<html>
<head>

<title>Panel Admin - NovaMarket</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.panel{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

</style>

</head>

<body>

<h1>Panel del Dueño</h1>

<div class="panel">

<p>Ventas totales: <span id="ventas">0</span></p>

<p>Ganancia (10%): $<span id="ganancia">0</span></p>

<button onclick="actualizar()">Actualizar datos</button>

</div>

<script>

let ventas=localStorage.getItem("ventas") || 0
let ganancia=localStorage.getItem("ganancia") || 0

document.getElementById("ventas").innerText=ventas
document.getElementById("ganancia").innerText=ganancia

function actualizar(){

ventas=localStorage.getItem("ventas") || 0
ganancia=localStorage.getItem("ganancia") || 0

document.getElementById("ventas").innerText=ventas
document.getElementById("ganancia").innerText=ganancia

}

</script>

</body>
</html>
