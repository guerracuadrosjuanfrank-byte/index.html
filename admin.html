<!DOCTYPE html>
<html>
<head>
<title>Panel de NovaMarket</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body>

<h1>Panel del Dueño - NovaMarket</h1>

<h2>📊 Estadísticas</h2>

<p>Ventas totales: <span id="ventas">0</span></p>
<p>Ganancia (10%): <span id="ganancia">0</span></p>
<p>Productos publicados: <span id="productos">0</span></p>
<p>Usuarios registrados: <span id="usuarios">0</span></p>

<script>

// TU CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_BUCKET",
  messagingSenderId: "TU_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let totalVentas = 0;

// contar pedidos
db.collection("pedidos").get().then((querySnapshot) => {

document.getElementById("ventas").innerText = querySnapshot.size;

querySnapshot.forEach((doc) => {
totalVentas += doc.data().precio;
});

let ganancia = totalVentas * 0.10;

document.getElementById("ganancia").innerText = "$" + ganancia;

});

// contar productos
db.collection("productos").get().then((querySnapshot) => {
document.getElementById("productos").innerText = querySnapshot.size;
});

// contar usuarios
db.collection("usuarios").get().then((querySnapshot) => {
document.getElementById("usuarios").innerText = querySnapshot.size;
});

</script>

</body>
</html>
