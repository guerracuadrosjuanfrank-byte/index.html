<!DOCTYPE html>
<html>
<head>

<title>NovaMarket 4.0</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.producto{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
margin-top:5px;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h1>NovaMarket 4.0</h1>

<h2>Publicar producto</h2>

<input id="nombre" placeholder="Nombre producto">
<input id="precio" placeholder="Precio">
<input id="video" placeholder="Link video (opcional)">

<button onclick="publicar()">Publicar</button>

<hr>

<h2>Buscar producto</h2>

<input id="buscar" placeholder="Buscar..." onkeyup="buscar()">

<hr>

<h2>Productos</h2>

<div id="productos"></div>

<hr>

<h2>Carrito</h2>

<div id="carrito"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="comprar()">Comprar</button>

<hr>

<h2>Panel del dueño</h2>

<p>Ventas: <span id="ventas">0</span></p>
<p>Ganancia 10%: $<span id="ganancia">0</span></p>

<script>

let productos=[]
let carrito=[]
let total=0
let ventas=0
let ganancia=0

function publicar(){

let nombre=document.getElementById("nombre").value
let precio=parseFloat(document.getElementById("precio").value)
let video=document.getElementById("video").value

productos.push({
nombre:nombre,
precio:precio,
video:video
})

mostrar()

}

function mostrar(){

let html=""

productos.forEach((p,i)=>{

html+=`

<div class="producto">

<h3>${p.nombre}</h3>

<p>$${p.precio}</p>

${p.video ? `<iframe width="200" src="${p.video}"></iframe>`:""}

<br>

<button onclick="agregar(${i})">Agregar al carrito</button>

</div>

`

})

document.getElementById("productos").innerHTML=html

}

function agregar(i){

carrito.push(productos[i])

total+=productos[i].precio

document.getElementById("total").innerText=total

}

function comprar(){

ventas++

let comision=total*0.10

ganancia+=comision

document.getElementById("ventas").innerText=ventas
document.getElementById("ganancia").innerText=ganancia

alert("Compra realizada")

carrito=[]
total=0

document.getElementById("total").innerText=0

}

function buscar(){

let filtro=document.getElementById("buscar").value.toLowerCase()

let lista=document.getElementsByClassName("producto")

for(let p of lista){

let texto=p.innerText.toLowerCase()

p.style.display=texto.includes(filtro)?"block":"none"

}

}

</script>

</body>
</html>
