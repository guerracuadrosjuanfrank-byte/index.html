<!DOCTYPE html>
<html>
<head>

<title>NovaMarket 5.0</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.producto{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
margin-top:5px;
}

input{
padding:8px;
margin:5px;
}

</style>

</head>

<body>

<h1>NovaMarket 5.0</h1>

<h2>Login vendedor</h2>

<input id="usuario" placeholder="Nombre vendedor">
<button onclick="login()">Entrar</button>

<p id="vendedor"></p>

<hr>

<h2>Publicar producto</h2>

<input id="nombre" placeholder="Nombre producto">
<input id="precio" placeholder="Precio">

<button onclick="publicar()">Publicar</button>

<hr>

<h2>Productos</h2>

<div id="productos"></div>

<hr>

<h2>Carrito</h2>

<p>Total: $<span id="total">0</span></p>

<button onclick="comprar()">Comprar</button>

<hr>

<h2>Pedidos realizados</h2>

<ul id="pedidos"></ul>

<script>

let productos=[]
let total=0
let vendedor=""

function login(){

vendedor=document.getElementById("usuario").value
document.getElementById("vendedor").innerText="Vendedor: "+vendedor

}

function publicar(){

let nombre=document.getElementById("nombre").value
let precio=parseFloat(document.getElementById("precio").value)

productos.push({
nombre:nombre,
precio:precio,
vendedor:vendedor,
rating:5
})

mostrar()

}

function mostrar(){

let html=""

productos.forEach((p,i)=>{

html+=`

<div class="producto">

<h3>${p.nombre}</h3>

<p>$${p.precio}</p>

<p>Vendedor: ${p.vendedor}</p>

<p>⭐ ${p.rating}</p>

<button onclick="agregar(${i})">Agregar al carrito</button>

</div>

`

})

document.getElementById("productos").innerHTML=html

}

function agregar(i){

total+=productos[i].precio

document.getElementById("total").innerText=total

}

function comprar(){

let ventas=localStorage.getItem("ventas") || 0
let ganancia=localStorage.getItem("ganancia") || 0

ventas++
ganancia=parseFloat(ganancia)+(total*0.10)

localStorage.setItem("ventas",ventas)
localStorage.setItem("ganancia",ganancia)

let lista=document.getElementById("pedidos")

let item=document.createElement("li")
item.innerText="Pedido de $"+total

lista.appendChild(item)

alert("Compra realizada")

total=0
document.getElementById("total").innerText=0

}

</script>

</body>
</html>
